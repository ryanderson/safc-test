<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFC Test Site</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    
---
layout: base.html
title: Member Flight Portal
---

<div class="pilot-dashboard-grid">
    
    <section class="calendar-view-panel">
        <h2>Aircraft Live Schedule</h2>
        <div data-tockify-calendar="ryanderson" data-tockify-component="calendar" data-tockify-view="month"></div>
    </section>

    <section class="booking-action-panel">
        <div class="sticky-card">
            <h3>Reserve the Aircraft</h3>
            <p>Check the schedule on the left. If the plane is open, tap below to secure your flight hours.</p>
            
            <button id="trigger-booking-btn" class="btn-primary">
                Book Flight Time
            </button>
        </div>
    </section>

</div>

<script data-cfasync="false" data-tockify-script="embed" src="https://public.tockify.com/browser/embed.js"></script>

<script type="text/javascript">
  (function (C, A, L) { 
    let p = function (a, ar) { a.q.push(ar); }; 
    let d = C.document; 
    C.Cal = C.Cal || function () { 
      let cal = C.Cal; 
      let ar = arguments; 
      if (!cal.loaded) { 
        cal.ns = {}; 
        cal.q = cal.q || []; 
        d.head.appendChild(d.createElement("script")).src = A; 
        cal.loaded = true; 
      } 
      if (ar[0] === L) { 
        const api = function () { p(api, arguments); }; 
        const namespace = ar[1]; 
        api.q = api.q || []; 
        if (typeof namespace === "string") { 
          cal.ns[namespace] = cal.ns[namespace] || api; 
          p(cal.ns[namespace], ar); 
          p(cal, ["initNamespace", namespace]); 
        } else p(cal, ar); 
        return; 
      } 
      p(cal, ar); 
    }; 
  })(window, "https://app.cal.com/embed/embed.js", "init");

  // Initialize Cal Engine
  Cal("init", { origin: "https://cal.com" });

  // Bind the popup overlay directly to your button ID
  Cal("getElementQueue", "#trigger-booking-btn", "popup", {
    calLink: "ryanderson/airplane-rental"
  });

  // Apply custom styling directly inside the modal framework
  Cal("ui", {
    theme: "light",
    styles: { branding: { brandColor: "#0055a5" } },
    hideEventTypeDetails: false,
    layout: "month_view"
  });
</script>

</body>
</html>
