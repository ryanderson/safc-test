<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFC Test Site</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    
    <div class="pilot-dashboard-grid">
        
        <!-- Left column: Tockify View (Forced to Month view layout) -->
        <section class="calendar-view-panel">
            <h2>Aircraft Live Schedule</h2>
            <div data-tockify-calendar="ryanderson" data-tockify-component="calendar" data-tockify-view="month"></div>
        </section>

        <!-- Right column: Cal.com Booking Action -->
        <section class="booking-action-panel">
            <div class="sticky-card">
                <h3>Reserve the Aircraft</h3>
                <p>Check the schedule on the left. If the plane is open, tap below to lock in your time slots.</p>
                <button id="trigger-booking-btn" class="btn-primary">Book Flight Time</button>
            </div>
        </section>

    </div>

    <!-- Embed Scripts -->
    <script data-cfasync="false" data-tockify-script="embed" src="https://public.tockify.com/browser/embed.js"></script>
    <script src="https://app.cal.com/embed/embed.js"></script>

    <script>
    (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; C.Cal = C.Cal || function () { p(Cal, arguments); }; Cal.q = Cal.q || []; })(window, window.Cal);
    Cal("init", { origin: "https://cal.com" });

    // Link your active Cal.com event slug to the button
    Cal("getElementQueue", "#trigger-booking-btn", "popup", {
        calLink: "ryan-anderson-71ku4q/airplane-rental"
    });
    </script>

</body>
</html>
