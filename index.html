<body>

<main> 
        <!-- Booking CTA Button -->
        <div style="margin: 20px 0;">
          <button 
            id="cal-booking-btn" 
            class="btn-primary"
            data-cal-link="ryanderson/airplane-rental"
            data-cal-namespace="airplane-rental"
            data-cal-config='{"layout":"month_view","useSlotsViewOnSmallScreen":"true"}'

            Book an Aircraft Slot

        </div>

        <!-- The Live Availability Calendar View -->
        <div class="calendar-wrapper">
          <iframe src="https://calendar.google.com/calendar/embed?height=600&wkst=2&ctz=America%2FVancouver&showPrint=0&title=GCBY&showCalendars=0&showTabs=0&showTitle=0&src=cnlhbkByeWFuZGVyc29uLmNvbQ&color=%23000000" style="border-width:0" width="800" height="600" frameborder="0" scrolling="no"></iframe>
        </div>
</main>
